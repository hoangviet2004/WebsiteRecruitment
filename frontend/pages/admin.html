<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Tổng Quan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="admin-content">
    <div class="admin-header">
        <h1><i class="fa-solid fa-chart-line"></i> Bảng Thống Kê Tổng Quan</h1>
        <p class="subtitle">Giám sát hoạt động hệ thống.</p>
    </div>

    <!-- STAT CARDS -->
    <div class="stats-grid">
        <div class="stat-card stat-card-blue">
            <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-users">--</span>
                <span class="stat-label">Tài khoản</span>
            </div>
        </div>
        <div class="stat-card stat-card-green">
            <div class="stat-icon"><i class="fa-solid fa-user-graduate"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-candidates">--</span>
                <span class="stat-label">Ứng viên</span>
            </div>
        </div>
        <div class="stat-card stat-card-purple">
            <div class="stat-icon"><i class="fa-solid fa-briefcase"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-jobs">--</span>
                <span class="stat-label">Tin tuyển dụng</span>
            </div>
        </div>
        <div class="stat-card stat-card-orange">
            <div class="stat-icon"><i class="fa-solid fa-building"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-companies">--</span>
                <span class="stat-label">Doanh nghiệp</span>
            </div>
        </div>
    </div>

    <!-- PENDING ITEMS -->
    <div class="admin-header" style="margin-top: 40px;">
        <h2><i class="fa-solid fa-clock"></i> Chờ Phê Duyệt</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card stat-card-warning">
            <div class="stat-icon"><i class="fa-solid fa-user-clock"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-pending-users">--</span>
                <span class="stat-label">Tài khoản chờ duyệt</span>
            </div>
        </div>
        <div class="stat-card stat-card-warning">
            <div class="stat-icon"><i class="fa-solid fa-file-circle-question"></i></div>
            <div class="stat-info">
                <span class="stat-number" id="stat-pending-jobs">--</span>
                <span class="stat-label">Tin tuyển dụng chờ duyệt</span>
            </div>
        </div>
    </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/guard.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/admin.js"></script>

<script>
  requireAdmin();
  loadSidebar();
</script>

</body>
</html>
