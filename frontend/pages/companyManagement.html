<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản Lý Công Ty</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="admin-content">
    <div class="admin-header">
        <h1><i class="fa-solid fa-building"></i> Quản Lý Công Ty</h1>
        <p class="subtitle">Quản lý thông tin các doanh nghiệp trên hệ thống.</p>
    </div>

    <!-- ── Toolbar ─────────────────────────────────────────── -->
    <div class="am-toolbar">
        <!-- Search -->
        <div class="am-search-wrap">
            <i class="fa-solid fa-magnifying-glass am-search-icon"></i>
            <input
                type="text"
                id="cm-search"
                class="am-search-input"
                placeholder="Tìm theo tên, địa chỉ, website..."
                oninput="applyFilters()"
                autocomplete="off"
            >
            <button class="am-search-clear" id="cm-clear-btn" onclick="clearSearch()" title="Xóa">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Company size filter -->
        <div class="am-select-wrap">
            <i class="fa-solid fa-users-line am-select-icon"></i>
            <select id="cm-filter-size" class="am-select" onchange="applyFilters()">
                <option value="">Tất cả quy mô</option>
                <option value="1-50">1 – 50</option>
                <option value="50-150">50 – 150</option>
                <option value="150-500">150 – 500</option>
                <option value="500+">500+</option>
            </select>
        </div>

        <!-- Has logo filter -->
        <div class="am-select-wrap">
            <i class="fa-solid fa-image am-select-icon"></i>
            <select id="cm-filter-logo" class="am-select" onchange="applyFilters()">
                <option value="">Tất cả</option>
                <option value="yes">Có logo</option>
                <option value="no">Chưa có logo</option>
            </select>
        </div>

        <!-- Sort dropdown -->
        <div class="am-select-wrap">
            <i class="fa-solid fa-arrow-up-wide-short am-select-icon"></i>
            <select id="cm-sort" class="am-select" onchange="applyFilters()">
                <option value="createdAt_desc">Mới nhất</option>
                <option value="createdAt_asc">Cũ nhất</option>
                <option value="name_asc">Tên A→Z</option>
                <option value="name_desc">Tên Z→A</option>
                <option value="address_asc">Địa chỉ A→Z</option>
            </select>
        </div>

        <!-- Result count -->

    </div>

    <!-- ── Table ───────────────────────────────────────────── -->
    <div class="data-card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width:56px;">Logo</th>
                        <th class="am-th-sort" onclick="sortByCol('name')" data-col="name">
                            Tên Công Ty <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th class="am-th-sort" onclick="sortByCol('address')" data-col="address">
                            Địa chỉ <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th>Website</th>
                        <th class="am-th-sort" onclick="sortByCol('size')" data-col="size">
                            Quy mô <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th class="am-th-sort" onclick="sortByCol('createdAt')" data-col="createdAt">
                            Ngày tạo <i class="fa-solid fa-sort-down am-sort-icon active-sort"></i>
                        </th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="company-table-body">
                    <tr><td colspan="7" style="text-align:center;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="am-pagination" id="cm-pagination"></div>
    </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/guard.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/companyManagement.js"></script>

<script>
  requireAdmin();
  loadSidebar();
</script>

</body>
</html>
