<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản Lý Ứng Viên</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="admin-content">
    <div class="admin-header">
        <h1><i class="fa-solid fa-user-graduate"></i> Quản Lý Ứng Viên</h1>
        <p class="subtitle">Quản lý danh sách ứng viên (Candidate) trên hệ thống.</p>
    </div>

    <div class="data-card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Tên</th>
                        <th>Đăng nhập qua</th>
                        <th>Trạng Thái</th>
                        <th>Ngày tạo</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="candidate-table-body">
                    <tr><td colspan="7" style="text-align: center;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Candidate Profile Modal -->
<div class="modal-overlay" id="candidateProfileModal" onclick="handleModalBackdropClick(event)">
    <div class="modal-card" id="candidateModalCard">
        <div class="modal-header">
            <h2><i class="fa-solid fa-id-card"></i> Hồ sơ ứng viên</h2>
            <button class="modal-close-btn" onclick="closeCandidateModal()" title="Đóng">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="modal-body" id="candidateModalBody">
            <div style="text-align:center; padding: 32px 0;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:28px; color:#3b82f6;"></i>
                <p style="margin-top:12px; color:#64748b;">Đang tải hồ sơ...</p>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/guard.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/candidateManagement.js"></script>

<script>
  requireAdmin();
  loadSidebar();
</script>

</body>
</html>
