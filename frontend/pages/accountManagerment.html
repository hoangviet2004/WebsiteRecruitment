<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản Lý Tài Khoản</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<div id="sidebar-container"></div>

<main class="admin-content">
    <div class="admin-header">
        <h1><i class="fa-solid fa-users"></i> Quản Lý Tài Khoản</h1>
        <p class="subtitle">Quản lý tất cả tài khoản người dùng trên hệ thống.</p>
    </div>

    <!-- ── Toolbar: Search + Filter + Sort ─────────────────── -->
    <div class="am-toolbar">
        <!-- Search box -->
        <div class="am-search-wrap">
            <i class="fa-solid fa-magnifying-glass am-search-icon"></i>
            <input
                type="text"
                id="am-search"
                class="am-search-input"
                placeholder="Tìm theo email, tên, ID..."
                oninput="applyFilters()"
                autocomplete="off"
            >
            <button class="am-search-clear" id="am-clear-btn" onclick="clearSearch()" title="Xóa">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Role filter -->
        <div class="am-select-wrap">
            <i class="fa-solid fa-shield-halved am-select-icon"></i>
            <select id="am-filter-role" class="am-select" onchange="applyFilters()">
                <option value="">Tất cả quyền</option>
                <option value="Admin">Quản trị viên</option>
                <option value="Recruiter">Nhà tuyển dụng</option>
                <option value="Candidate">Ứng viên</option>
            </select>
        </div>

        <!-- Status filter -->
        <div class="am-select-wrap">
            <i class="fa-solid fa-circle-dot am-select-icon"></i>
            <select id="am-filter-status" class="am-select" onchange="applyFilters()">
                <option value="">Tất cả trạng thái</option>
                <option value="active">Hoạt động</option>
                <option value="blocked">Bị chặn</option>
            </select>
        </div>

        <!-- Sort dropdown -->
        <div class="am-select-wrap">
            <i class="fa-solid fa-arrow-up-wide-short am-select-icon"></i>
            <select id="am-sort" class="am-select" onchange="applyFilters()">
                <option value="createdAt_desc">Mới nhất</option>
                <option value="createdAt_asc">Cũ nhất</option>
                <option value="email_asc">Email A→Z</option>
                <option value="email_desc">Email Z→A</option>
                <option value="name_asc">Tên A→Z</option>
                <option value="name_desc">Tên Z→A</option>
                <option value="role_asc">Quyền A→Z</option>
            </select>
        </div>

        <!-- Result count -->
        <span class="am-result-count" id="am-count"></span>
    </div>

    <!-- ── Table ─────────────────────────────────────────────── -->
    <div class="data-card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="am-th-sort" onclick="sortByCol('id')" data-col="id">
                            ID <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th class="am-th-sort" onclick="sortByCol('email')" data-col="email">
                            Email <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th class="am-th-sort" onclick="sortByCol('name')" data-col="name">
                            Tên <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th class="am-th-sort" onclick="sortByCol('role')" data-col="role">
                            Quyền <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th class="am-th-sort" onclick="sortByCol('status')" data-col="status">
                            Trạng Thái <i class="fa-solid fa-sort am-sort-icon"></i>
                        </th>
                        <th class="am-th-sort" onclick="sortByCol('createdAt')" data-col="createdAt">
                            Ngày tạo <i class="fa-solid fa-sort-down am-sort-icon active-sort"></i>
                        </th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <tr><td colspan="7" style="text-align:center;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination bar -->
        <div class="am-pagination" id="am-pagination"></div>
    </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/guard.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/accountManagement.js"></script>

<script>
  requireAdmin();
  loadSidebar();
</script>

</body>
</html>
