<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi</title>
    <link rel="stylesheet" href="../assets/css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>
<body>
    <nav class="homebar">
        <div class="left">
            <a href="home.html" class="logo-svg"><img src="../assets/logo.svg" alt="Logo">TechList</a>
            <ul>
                <li><a href="#">Tìm việc</a></li>
                <li><a href="#">Công ty</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </div>
        <div class="right" id="nav-right"></div>
    </nav>

    <div class="content profile-container">
        <div class="profile-grid">
            <div class="profile-card">
            <h2>Thông tin cá nhân</h2>
            <p class="subtitle">Quản lý thông tin hồ sơ để bảo mật tài khoản</p>
            
            <div class="avatar-upload-container">
                <div class="avatar-preview-wrap">
                    <img id="avatar-preview" src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff&size=150" alt="Avatar">
                    <label for="avatar-input" class="avatar-edit-overlay" title="Thay đổi ảnh đại diện">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                </div>
                <input type="file" id="avatar-input" accept="image/*" hidden>
                <div class="avatar-loading" id="avatar-loading" style="display: none;">Đang tải lên...</div>
            </div>

            <form id="profile-form">
                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên của bạn">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email của bạn">
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="text" id="phone" name="phone" placeholder="Nhập số điện thoại">
                </div>

                <div class="form-group">
                    <label for="bio">Giới thiệu bản thân</label>
                    <textarea id="bio" name="bio" placeholder="Viết vài dòng giới thiệu về bản thân, kỹ năng và mục tiêu nghề nghiệp của bạn..." rows="5"></textarea>
                    <span class="bio-counter"><span id="bio-count">0</span> / 500 ký tự</span>
                </div>
                
                <button type="submit" class="btn-save">Lưu thay đổi</button>
            </form>
        </div>

        <div class="profile-card">
            <h2>Hồ sơ & Năng lực</h2>
            <p class="subtitle">Bổ sung CV, kỹ năng và kinh nghiệm để nhà tuyển dụng chú ý</p>
            
            <div class="form-group cv-upload-group">
                <label>CV đính kèm (Chỉ hỗ trợ PDF)</label>
                <div class="cv-upload-box">
                    <input type="file" id="cv-input" accept="application/pdf" hidden>
                    <div class="cv-preview" id="cv-preview" style="display: none;">
                        <i class="fa-solid fa-file-pdf" style="color: #ef4444; font-size: 24px;"></i>
                        <a href="#" id="cv-link" target="_blank">Xem CV hiện tại</a>
                        <button type="button" class="btn-change-cv" onclick="document.getElementById('cv-input').click()">Thay đổi</button>
                    </div>
                    <div class="cv-empty" id="cv-empty">
                        <i class="fa-solid fa-cloud-arrow-up" style="color: #64748b; font-size: 24px; margin-bottom: 8px; display: block;"></i>
                        <p>Tải lên CV của bạn (.pdf)</p>
                        <button type="button" class="btn-upload-cv" onclick="document.getElementById('cv-input').click()">Chọn file</button>
                    </div>
                    <div class="cv-loading" id="cv-loading" style="display: none; color: #3b82f6; font-weight: 500;">
                        <i class="fa-solid fa-spinner fa-spin"></i> Đang tải lên...
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="skills">Kỹ năng chuyên môn</label>
                <textarea id="skills" name="skills" placeholder="VD: ReactJS, .NET Core, SQL Server, Tiếng Anh giao tiếp..." rows="4" form="profile-form"></textarea>
            </div>

            <div class="form-group">
                <label for="experience">Kinh nghiệm làm việc</label>
                <textarea id="experience" name="experience" placeholder="Mô tả quá trình làm việc của bạn..." rows="5" form="profile-form"></textarea>
            </div>
        </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/home.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
